<!DOCTYPE html>
<html>
    <head>
        <title>
            my Interest
        </title>

    </head>
    <body>
        <form action="https://etolabour.gov.mt">
            <fieldset>
                <legend>
                    User information
                </legend>
                <label>
                    Name:
                    <input type="text" name="username">
                    <br />
                    <br />

                </label>
                <label>
                    Email:
                    <input type="email" name="email"><br /><br />

                </label>
                <label>
                    Pswd:
                    <input type="password" name="password"><br /><br />
                </label>
            </fieldset>
            <fieldset>
                <legend>
                    interestopia
                </legend>
                <label for="hear-about">How did you hear about us.</label>
                <select name="infogot" id="hear-about">
                    <option value="google">Google</option>
                    <option value="ads">Advertisements</option>
                    <option value="friends">Friends</option>
                    <option value="smd">Social media(i.e facebook)</option>
                    <option value="other">Others</option>
                </select>
                <p>
                    Your favourite way to make a website is<br />
                    <label>
                        <input type="radio" name="webgeek" value="CMS">
                        wordpress(CMS)
                    </label><br />
                    <label>
                        <input type="radio" name="webgeek" value="learn webdev">
                        learn web development and make my very own one.
                    </label><br />
                    <label>
                        <input type="radio" name="webgeek" value="lazybeezy">
                        employ a web developer and let him do my own one
                    </label><br />
                </p>
                <p>
                    <label for="comments">What do you know about Web 3.0.? What is your opinion on it?</label>
                    <br />
                    <br />
                    <textarea name="webopinion" id="comments" cols="55" rows="5"></textarea>
                </p>
                <p>
                    Thanks for participation.<br />
                    We send editors' weekly selected best blogs to our email subscriber.<br />You can be one, subscription is free.
                    <br />You can cancel at any time.
                </p>
                <label>
                    <input type="checkbox" name="subscribe" checked="checked">
                    Send me weekly news letter
                </label>
                <br />
                <input type="submit" value="send this form">
            </fieldset>
        </form>
    </body>
</html>
